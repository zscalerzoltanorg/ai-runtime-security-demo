services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-runtime-security-demo-app
    environment:
      HOST: 0.0.0.0
      PORT: 5000
      OLLAMA_URL: http://ollama:11434
      APP_ENV_FILE_PATH: /app/.env.local
      APP_USAGE_DB_PATH: /app-data/usage_metrics.db
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - ${APP_SETTINGS_FILE:-./.env.local}:/app/.env.local
      - app_data:/app-data
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ai-runtime-security-demo-ollama
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data:
  app_data:
